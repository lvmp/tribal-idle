name: tribal_idle
description: "Tribal Idle: Dawn of Fire — Idle survival tribe management game."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # ── ADR 002: Game Engine ──────────────────────────────────────
  flame: ^1.21.0                  # Core game engine (game loop, components, sprites)
  flame_audio: ^2.10.5            # Audio integrated with Flame lifecycle

  # ── ADR 001: State Management ─────────────────────────────────
  flutter_riverpod: ^3.2.1        # Reactive state / DI container (works outside BuildContext)
  riverpod_annotation: ^4.0.2     # Annotations for code generation

  # ── ADR 003: Persistence ──────────────────────────────────────
  hive_flutter: ^1.1.0            # Hive with Flutter init support (fast NoSQL, offline-first)

  # ── ADR 004: Monetization ─────────────────────────────────────
  google_mobile_ads: ^5.3.0       # AdMob + Mediation (Rewarded Ads)

  # ── Utilities ─────────────────────────────────────────────────
  logger: ^2.5.0                  # Structured logging

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0           # Lint rules
  riverpod_generator: ^4.0.3      # Code gen for @riverpod providers
  build_runner: ^2.4.15           # Build system
  # hive_generator: ^2.0.1        # Disabled: source_gen version conflict with riverpod_generator ^3.0.0
  #                                # Using JSON-based serialization (toJson/fromJson) instead of TypeAdapters
  mocktail: ^1.0.4                 # Mocking for unit tests

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/background/
    - assets/images/fogueira/
    - assets/audio/
